<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MAASC Result System</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px}
.container{max-width:1200px;margin:auto;background:white;padding:20px;border-radius:10px}

select,input,button{padding:10px;margin:5px}

table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #ccc;padding:10px;text-align:center}
th{background:#eee}

.save{background:green;color:white;border:none}
.load{background:#007bff;color:white;border:none}
</style>
</head>

<body>

<div class="container">

<h2>MAASC RESULT SYSTEM</h2>

<!-- 🔥 DEPARTMENTS (UNCHANGED) -->
<select id="department">
  <option value="">Select Department</option>

  <option value="BCOM-GENERAL">B.Com General</option>
  <option value="BCOM-BM">B.Com BM</option>
  <option value="BCOM-MM">B.Com MM</option>
  <option value="BCOM-CS">B.Com CS</option>
  <option value="BCOM-AF">B.Com A&F</option>
  <option value="BCOM-ISM">B.Com ISM</option>
  <option value="BCOM-CA">B.Com CA</option>
  <option value="BCOM-BUSAD">B.Com BUS.AD</option>

  <option value="BA-DEFENCE">B.A DEFENCE</option>
  <option value="BA-PUBAD">B.A PUB.AD</option>
  <option value="BA-TAMIL">B.A TAMIL</option>
  <option value="BA-TOURISM">B.A TOURISM</option>

  <option value="BSC-CS">B.Sc CS</option>
  <option value="BSC-CS-AI">B.Sc CS WITH AI</option>
  <option value="BSC-CRIMINOLOGY">B.Sc CRIMINOLOGY</option>
  <option value="BSC-SA">B.Sc SA</option>
  <option value="BSC-PHYS-CA">B.Sc PHYS WITH CA</option>
  <option value="BSC-MATHS-CA">B.Sc MATHS WITH CA</option>
  <option value="BSC-ELEC-AI">B.Sc ELECTRONICS WITH AI</option>
  <option value="BSC-VISCOM">B.Sc VISCOM</option>
  <option value="BSC-ELECTRONIC-MEDIA">B.Sc ELECTRONIC MEDIA</option>
  <option value="BSC-IDD">B.Sc IDD</option>
  <option value="BSC-PHYSICS">B.Sc PHYSICS</option>

  <option value="BCA">BCA COMPUTER APPLICATION</option>
</select>

<!-- YEAR -->
<select id="year">
  <option value="">Year</option>
  <option value="I">I Year</option>
  <option value="II">II Year</option>
  <option value="III">III Year</option>
</select>

<!-- SECTION -->
<select id="section">
  <option value="">Section</option>
  <option value="A">A</option>
  <option value="B">B</option>
  <option value="C">C</option>
  <option value="D">D</option>
</select>

<!-- EXAM TYPE -->
<select id="examType" onchange="changeUI()">
  <option value="">Exam Type</option>
  <option value="CYCLIC-1">Cyclic Test 1</option>
  <option value="CYCLIC-2">Cyclic Test 2</option>
  <option value="INTERNAL-1">Internal Test 1</option>
  <option value="INTERNAL-2">Internal Test 2</option>
  <option value="MODEL">Model Exam</option>
  <option value="SEMESTER">Semester Exam</option>
</select>

<!-- 🔥 COMMON SUBJECT INPUT -->
<input type="text" id="subject" placeholder="Enter Subject Name (Common for all students)">

<button class="load" onclick="loadStudents()">Load Students</button>
<a href="result-update.html"><button>Update Result</button></a>

<table>
<thead id="thead"></thead>
<tbody id="body"></tbody>
</table>

<br>

<button class="save" onclick="saveData()">Save</button>

</div>

<script type="module">

import { db } from "./firebase-config.js";
import {
collection,
getDocs,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let students = [];
let mode = "";

/* ================= UI ================= */
window.changeUI = function(){

  const exam = document.getElementById("examType").value;

  if(exam.includes("CYCLIC") || exam.includes("INTERNAL")){
    mode = "simple";
    document.getElementById("thead").innerHTML = `
      <tr>
        <th>Reg No</th>
        <th>Name</th>
        <th>Mark</th>
        <th>Result</th>
      </tr>`;
  }
  else{
    mode = "advanced";
    document.getElementById("thead").innerHTML = `
      <tr>
        <th>Reg No</th>
        <th>Name</th>
        <th>IA</th>
        <th>UE</th>
        <th>Total</th>
        <th>Result</th>
      </tr>`;
  }
};

/* ================= LOAD STUDENTS (FIXED) ================= */
window.loadStudents = async function(){

  const dept = document.getElementById("department").value;
  const year = document.getElementById("year").value;
  const section = document.getElementById("section").value;

  const snap = await getDocs(collection(db,"students"));

  document.getElementById("body").innerHTML = "";
  students = [];

  let found = false;

  snap.forEach(docSnap => {

    const s = docSnap.data();

    // 🔥 SAFE NORMALIZATION (IMPORTANT FIX)
    const dbDept = (s.department || "").toUpperCase().replace(/\s+/g,"");
    const selDept = (dept || "").toUpperCase().replace(/\s+/g,"");

    const dbYear = (s.year || "").toUpperCase();
    const selYear = (year || "").toUpperCase();

    const dbSec = (s.section || "").toUpperCase();
    const selSec = (section || "").toUpperCase();

    // FILTER FIXED
    if(selDept && dbDept.indexOf(selDept) === -1) return;
    if(selYear && dbYear !== selYear) return;
    if(selSec && dbSec !== selSec) return;

    found = true;
    students.push(docSnap.id);

    if(mode === "simple"){
      document.getElementById("body").innerHTML += `
        <tr>
          <td>${s.regNo}</td>
          <td>${s.name}</td>
          <td><input type="number" id="mark_${docSnap.id}" oninput="calc('${docSnap.id}')"></td>
          <td><input id="res_${docSnap.id}" readonly></td>
        </tr>`;
    }
    else{
      document.getElementById("body").innerHTML += `
        <tr>
          <td>${s.regNo}</td>
          <td>${s.name}</td>
          <td><input type="number" id="ia_${docSnap.id}" oninput="calc('${docSnap.id}')"></td>
          <td><input type="number" id="ue_${docSnap.id}" oninput="calc('${docSnap.id}')"></td>
          <td><input id="tot_${docSnap.id}" readonly></td>
          <td><input id="res_${docSnap.id}" readonly></td>
        </tr>`;
    }

  });

  if(!found){
    alert("No students found! Check department/year/section values in Firestore.");
  }
};

/* ================= CALC ================= */
window.calc = function(id){

  let mark = Number(document.getElementById("mark_"+id).value) || 0;

  if(mark >= 12){
    document.getElementById("res_"+id).value = "PASS";
  } else {
    document.getElementById("res_"+id).value = "FAIL";
  }
};

/* ================= SAVE ================= */
window.saveData = async function(){

  const dept = document.getElementById("department").value;
  const year = document.getElementById("year").value;
  const section = document.getElementById("section").value;
  const exam = document.getElementById("examType").value;
  const subject = document.getElementById("subject").value;

  if(!dept || !year || !section || !exam || !subject){
    alert("Fill all fields");
    return;
  }

  for(let id of students){

    if(mode === "simple"){
      let mark = Number(document.getElementById("mark_"+id).value)||0;
      let res = document.getElementById("res_"+id).value;

      await setDoc(doc(db,"results",id,exam,subject),{
        department:dept,
        year,
        section,
        examType:exam,
        subject,
        mark,
        result:res
      });
    }
    else{
      let ia = Number(document.getElementById("ia_"+id).value)||0;
      let ue = Number(document.getElementById("ue_"+id).value)||0;
      let tot = ia + ue;
      let res = document.getElementById("res_"+id).value;

      await setDoc(doc(db,"results",id,exam,subject),{
        department:dept,
        year,
        section,
        examType:exam,
        subject,
        ia,
        ue,
        total:tot,
        result:res
      });
    }
  }

  alert("Saved Successfully");
};

</script>

</body>
</html>
