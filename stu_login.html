<!DOCTYPE html>
<html>
<head>
  <title>M.A.A.S.C STUDENT LOGIN</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
    }

    /* Header */
    .top-header {
      display: flex;
      align-items: center;
      background: #f8f9fa;
      padding: 15px;
      border-bottom: 2px solid #ccc;
    }
    .logo {
      height: 150px;
      margin-right: 80px;
    }
    .college-info {
      flex: 1;
    }
    .college-info h1 {
      margin: 0;
      color: #333;
    }
    .header-buttons {
      margin-left: auto;
    }

    /* Main Layout */
    .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px 80px;
    }
    .left-section {
      width: 55%;
      text-align: center;
    }
    .left-section img {
      max-width: 25%;
      height: auto;
    }

    /* Login Box */
    .login-box {
      align-items: center;
      width: 350px;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 10px 4px 10px rgba(0,0,0,0.2);
    }
    .login-box h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .login-box label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #444;
    }
    .login-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: #f1c40f; /* Yellow button */
      border: none;
      border-radius: 4px;
      color: #000;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .login-box button:hover {
      background: #d4ac0d;
    }
    #error {
      color: red;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="top-header">
    <img src="logo.png" alt="College Logo" class="logo">
    <div class="college-info">
      <h1 align="center">MURALI ARTS AND SCIENCE COLLEGE</h1>
      <p align="center">Affiliated to University of Madras | NAAC A+</p>
      <p align="center">A Co-Educational Institution | Tambaram, Chennai – 600 045</p>
      <p align="center">Student Login</p>
      <div class="header-buttons">
        <p align="center"><a href="index.html"><button>Back To Home</button></a></p>
      </div>
    </div>
  </header>

 <h1>ONLY ACCESIBLE FOR ONLINE PAYMENTS</h1> <br><br>
  <h3> To pay Fees Online Contact Office</h3>
</body>
</html>
