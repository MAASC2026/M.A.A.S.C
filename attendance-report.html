<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Attendance Report</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

h2{
text-align:center;
color:#500454;
margin-bottom:20px;
}

.filters{

display:flex;

flex-wrap:wrap;

gap:10px;

margin-bottom:20px;

}

input,select,button{

padding:10px;

border-radius:5px;

border:1px solid #ccc;

}

button{

background:#500454;

color:white;

cursor:pointer;

}

.summary{

display:flex;

gap:20px;

margin:20px 0;

}

.card{

flex:1;

background:#eee;

padding:15px;

text-align:center;

border-radius:10px;

font-size:18px;

font-weight:bold;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

th,td{

border:1px solid #ddd;

padding:10px;

text-align:center;

}

th{

background:#500454;

color:white;

}

.present{

color:green;

font-weight:bold;

}

.absent{

color:red;

font-weight:bold;

}

@media print{

button,.filters{

display:none;

}

body{

background:white;

}

}

@media print{

.filters{

display:none;

}

.summary{

margin-bottom:20px;

}

button{

display:none;

}

body{

background:white;

}

.container{

box-shadow:none;

}

}
</style>

</head>

<body>

<div class="container">

<h2>Attendance Report</h2>

<div class="filters">

<input
type="text"
id="regNo"
placeholder="Register Number">

<select id="dept">

<option value="">Department</option>

<option>B.Com General</option>
<option>B.Com BM</option>
<option>B.Com MM</option>
<option>B.Com CS</option>
<option>B.Com A&F</option>
<option>B.Com ISM</option>
<option>B.Com CA</option>
<option>B.Com BUS.AD</option>

<option>B.A DEFENCE</option>
<option>B.A PUB.AD</option>
<option>B.A TAMIL</option>
<option>B.A TOURISM</option>

<option>B.Sc CS</option>
<option>B.Sc CS WITH AI</option>
<option>B.Sc CRIMINOLOGY</option>
<option>B.Sc SA</option>
<option>B.Sc PHYS WITH CA</option>
<option>B.Sc MATHS WITH CA</option>
<option>B.Sc ELECTRONICS WITH AI</option>
<option>B.Sc VISCOM</option>
<option>B.Sc ELECTRONIC MEDIA</option>
<option>B.Sc IDD</option>
<option>B.Sc PHYSICS</option>

<option>BCA COMPUTER APPLICATIONS</option>

</select>

<select id="year">

<option value="">Year</option>

<option>I</option>

<option>II</option>

<option>III</option>

</select>

<select id="section">

<option value="">Section</option>

<option>A</option>

<option>B</option>

<option>C</option>

<option>D</option>

<option>E</option>

<option>F</option>

</select>

<input
type="date"
id="date">

<button onclick="studentReport()">

Student Report

</button>

<button onclick="classReport()">

Class Report

</button>

<button onclick="window.print()">

Print

</button>

<button onclick="exportExcel()">

Excel

</button>
<button onclick="exportCSV()">

CSV

</button>

</div>

<div class="summary">

<div class="card">

Present

<br>

<span id="present">

0

</span>

</div>

<div class="card">

Absent

<br>

<span id="absent">

0

</span>

</div>

<div class="card">

Attendance %

<br>

<span id="percent">

0%

</span>

</div>

</div>

<table>

<thead>

<tr>

<th>Date</th>

<th>Reg No</th>

<th>Name</th>

<th>P1</th>

<th>P2</th>

<th>P3</th>

<th>P4</th>

<th>P5</th>

<th>Total</th>

</tr>

</thead>

<tbody id="reportBody">

</tbody>

</table>
</div>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script type="module">
   import { db } from "./firebase-config.js";

import{
collection,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
window.studentReport = async function(){

const reg=document.getElementById("regNo")
.value
.trim()
.toUpperCase();

if(reg==""){
alert("Enter Register Number");
return;
}

const body=document.getElementById("reportBody");

body.innerHTML="";

document.getElementById("present").innerHTML=0;
document.getElementById("absent").innerHTML=0;
document.getElementById("percent").innerHTML="0%";

const q=query(
collection(db,"attendance"),
where("regNo","==",reg)
);

const snap=await getDocs(q);

if(snap.empty){

body.innerHTML="<tr><td colspan='9'>No Attendance Found</td></tr>";

return;

}

let present=0;
let absent=0;

const rows=[];

snap.forEach(doc=>{

rows.push(doc.data());

});

rows.sort((a,b)=>a.date.localeCompare(b.date));

rows.forEach(r=>{

const att=r.attendance||{};

const p1=att["1"]||"-";
const p2=att["2"]||"-";
const p3=att["3"]||"-";
const p4=att["4"]||"-";
const p5=att["5"]||"-";

let totalPresent=0;

[p1,p2,p3,p4,p5].forEach(x=>{

if(x=="P"){

present++;
totalPresent++;

}

else if(x=="A"){

absent++;

}

});

body.innerHTML+=`

<tr>

<td>${r.date}</td>

<td>${r.regNo}</td>

<td>${r.name||""}</td>

<td class="${p1=="P"?"present":"absent"}">${p1}</td>

<td class="${p2=="P"?"present":"absent"}">${p2}</td>

<td class="${p3=="P"?"present":"absent"}">${p3}</td>

<td class="${p4=="P"?"present":"absent"}">${p4}</td>

<td class="${p5=="P"?"present":"absent"}">${p5}</td>

<td>${totalPresent}/5</td>

</tr>

`;

});

const total=present+absent;

document.getElementById("present").innerHTML=present;

document.getElementById("absent").innerHTML=absent;

document.getElementById("percent").innerHTML=

total?

((present/total)*100).toFixed(2)+"%"

:

"0%";

}
window.exportExcel=function(){

const table=document.getElementById("reportBody");

if(table.rows.length==0){

alert("No Data");

return;

}

const wb=XLSX.utils.book_new();

const ws=XLSX.utils.table_to_sheet(document.querySelector("table"));

XLSX.utils.book_append_sheet(wb,ws,"Attendance Report");

XLSX.writeFile(wb,"Attendance_Report.xlsx");

}
window.exportCSV=function(){

const rows=document.querySelectorAll("table tr");

let csv=[];

rows.forEach(r=>{

let row=[];

r.querySelectorAll("th,td").forEach(c=>{

row.push(c.innerText);

});

csv.push(row.join(","));

});

const blob=new Blob([csv.join("\n")],{

type:"text/csv"

});

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="Attendance.csv";

a.click();

}
/* ==========================================
   CLASS ATTENDANCE REPORT
========================================== */

window.classReport = async function(){

const dept=document.getElementById("dept").value.trim();
const year=document.getElementById("year").value.trim();
const section=document.getElementById("section").value.trim();
const date=document.getElementById("date").value;

const body=document.getElementById("reportBody");

body.innerHTML="";

if(!dept || !year || !section || !date){

alert("Select Department, Year, Section and Date");

return;

}

document.getElementById("present").innerHTML="0";
document.getElementById("absent").innerHTML="0";
document.getElementById("percent").innerHTML="0%";

/* ===========================
   LOAD STUDENTS
=========================== */

const studentQuery=query(

collection(db,"students"),

where("department","==",dept),

where("year","==",year),

where("section","==",section)

);

const studentSnap=await getDocs(studentQuery);

if(studentSnap.empty){

body.innerHTML="<tr><td colspan='9'>No Students Found</td></tr>";

return;

}

let presentPeriods=0;
let absentPeriods=0;

for(const studentDoc of studentSnap.docs){

const s=studentDoc.data();

/* ===========================
   LOAD ATTENDANCE
=========================== */

const attendanceQuery=query(

collection(db,"attendance"),

where("regNo","==",s.regNo),

where("date","==",date)

);

const attendanceSnap=await getDocs(attendanceQuery);

let attendance={};

attendanceSnap.forEach(doc=>{

attendance=doc.data().attendance||{};

});

const p1=attendance["1"]||"-";
const p2=attendance["2"]||"-";
const p3=attendance["3"]||"-";
const p4=attendance["4"]||"-";
const p5=attendance["5"]||"-";

let totalPresent=0;

[p1,p2,p3,p4,p5].forEach(x=>{

if(x=="P"){

presentPeriods++;
totalPresent++;

}

else if(x=="A"){

absentPeriods++;

}

});

body.innerHTML+=`

<tr>

<td>${date}</td>

<td>${s.regNo}</td>

<td>${s.name}</td>

<td class="${p1=="P"?"present":"absent"}">${p1}</td>

<td class="${p2=="P"?"present":"absent"}">${p2}</td>

<td class="${p3=="P"?"present":"absent"}">${p3}</td>

<td class="${p4=="P"?"present":"absent"}">${p4}</td>

<td class="${p5=="P"?"present":"absent"}">${p5}</td>

<td>${totalPresent}/5</td>

</tr>

`;

}

const total=presentPeriods+absentPeriods;

document.getElementById("present").innerHTML=presentPeriods;

document.getElementById("absent").innerHTML=absentPeriods;

document.getElementById("percent").innerHTML=

total

?

((presentPeriods/total)*100).toFixed(2)+"%"

:

"0%";

}
window.monthReport=async function(){

const month=prompt("Enter Month (YYYY-MM)");

if(!month)return;

const body=document.getElementById("reportBody");

const rows=body.querySelectorAll("tr");

rows.forEach(r=>{

const date=r.cells[0].innerText;

r.style.display=

date.startsWith(month)

?

""

:

"none";

});

}
window.departmentSummary=function(){

let students=0;

let present=0;

let absent=0;

document

.querySelectorAll("#reportBody tr")

.forEach(r=>{

students++;

for(let i=3;i<=7;i++){

const val=r.cells[i].innerText;

if(val=="P")present++;

if(val=="A")absent++;

}

});

alert(

"Students : "+students+

"\nPresent Periods : "+present+

"\nAbsent Periods : "+absent

);

}
</script>
</body>
</html>
