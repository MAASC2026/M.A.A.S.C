<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAASC Staff Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:420px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo img{
    width:100px;
}

h2{
    color:#500454;
    text-align:center;
    margin-bottom:5px;
}

h4{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#500454;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#72067a;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#777;
    font-size:14px;
}

.loading{
    display:none;
    color:#500454;
    text-align:center;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
<img src="logo.png" alt="Logo">
</div>

<h2>M.A.A.S COLLEGE</h2>

<h4>STAFF LOGIN</h4>

<input
type="text"
id="staffId"
placeholder="User ID">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
LOGIN
</button>

<div
class="loading"
id="loading">
Please wait...
</div>

<div class="footer">
Murali Arts and Science College
</div>

</div>

<script type="module">

import { db } from "./firebase-config.js";

import {
doc,
getDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.login = async function(){

const loading =
document.getElementById("loading");

loading.style.display="block";

const staffId =
document.getElementById("staffId")
.value
.trim()
.toUpperCase();

const password =
document.getElementById("password")
.value
.trim();

if(staffId=="" || password==""){

loading.style.display="none";

alert("Enter User ID and Password");

return;

}

/* ==========================
   ADMIN LOGIN
========================== */

if(
staffId==="ADMIN" &&
password==="admin@maasc"
){

loading.style.display="none";

sessionStorage.setItem(
"role",
"admin"
);

sessionStorage.setItem(
"staffId",
"ADMIN"
);

sessionStorage.setItem(
"staffName",
"Administrator"
);

window.location.href=
"admin-dashboard.html";

return;

}

/* ==========================
   STAFF LOGIN
========================== */

try{

const ref =
doc(db,"staff",staffId);

const snap =
await getDoc(ref);

loading.style.display="none";

if(!snap.exists()){

alert("Staff ID Not Found");

return;

}

const data =
snap.data();

if(data.password!==password){

alert("Incorrect Password");

return;

}

/* SESSION */

sessionStorage.setItem(
"role",
"staff"
);

sessionStorage.setItem(
"staffId",
data.staffId
);

sessionStorage.setItem(
"staffName",
data.name
);

sessionStorage.setItem(
"department",
data.department
);

alert("Login Successful");

window.location.href=
"staff-dashboard.html";

}
catch(error){

loading.style.display="none";

console.error(error);

alert(error.message);

}

}

</script>

</body>
</html>
