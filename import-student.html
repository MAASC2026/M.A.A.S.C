<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Import Students

</title>

<link
rel="stylesheet"
href="import-style.css">

<script
src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js">
</script>

</head>

<body>

<div class="container">

<div class="header">

<img
src="logo.png"
class="logo">

<h2>

M.A.A.S COLLEGE

</h2>

<h3>

STUDENT IMPORT

</h3>

</div>

<div class="uploadBox">

<input
type="file"
id="excelFile"
accept=".xlsx,.xls">

<button
id="previewBtn">

Preview Excel

</button>

<button
id="importBtn">

Import Students

</button>

</div>

<div class="progress">

<div
id="progressBar">

0%

</div>

</div>

<div class="status">

<span id="status">

Waiting for Excel File...

</span>

</div>

<table>

<thead>

<tr>

<th>Register No</th>

<th>Name</th>

<th>Department</th>

<th>Section</th>

<th>Semester</th>

</tr>

</thead>

<tbody
id="previewBody">

</tbody>

</table>

</div>

<script
type="module"
src="import-students.js">

</script>

</body>

</html>
