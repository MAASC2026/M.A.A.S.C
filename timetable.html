<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Exam Schedule Entry</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h2{
    text-align:center;
}

select,input{
    width:100%;
    padding:8px;
    margin:6px 0;
    box-sizing:border-box;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    table-layout:fixed;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
    vertical-align:middle;
    word-wrap:break-word;
}

th{
    background:#f0f0f0;
}

/* Column alignment */
th:nth-child(1), td:nth-child(1){width:15%;}
th:nth-child(2), td:nth-child(2){width:25%;}
th:nth-child(3), td:nth-child(3){width:15%;}
th:nth-child(4), td:nth-child(4){width:20%;}
th:nth-child(5), td:nth-child(5){width:25%;}

button{
    padding:10px 15px;
    margin-top:10px;
    cursor:pointer;
    border:none;
}

.add{background:#007bff;color:white;}
.save{background:green;color:white;}
</style>
</head>

<body>

<div class="container">

<h2>Exam Schedule Entry Portal</h2>

<select id="dept" onchange="loadExam()">

    <option value="BCOM-GENERAL">B.Com General</option>
    <option value="BCOM-BM">B.Com BM</option>
    <option value="BCOM-MM">B.Com MM</option>
    <option value="BCOM-CS">B.Com CS</option>
    <option value="BCOM-AF">B.Com A&F</option>
    <option value="BCOM-ISM">B.Com ISM</option>
    <option value="BCOM-CA">B.Com CA</option>
    <option value="BCOM-BUSAD">B.Com BUS.AD</option>

    <option value="BA-DEFENCE">B.A DEFENCE</option>
    <option value="BA-PUBAD">B.A PUB.AD</option>
    <option value="BA-TAMIL">B.A TAMIL</option>
    <option value="BA-TOURISM">B.A TOURISM</option>

    <option value="BSC-CS">B.Sc CS</option>
    <option value="BSC-CS-AI">B.Sc CS WITH AI</option>
    <option value="BSC-CRIMINOLOGY">B.Sc CRIMINOLOGY</option>
    <option value="BSC-SA">B.Sc SA</option>
    <option value="BSC-PHYS-CA">B.Sc PHYS WITH CA</option>
    <option value="BSC-MATHS-CA">B.Sc MATHS WITH CA</option>
    <option value="BSC-ELEC-AI">B.Sc ELECTRONICS WITH AI</option>
    <option value="BSC-VISCOM">B.Sc VISCOM</option>
    <option value="BSC-ELECTRONIC-MEDIA">B.Sc ELECTRONIC MEDIA</option>
    <option value="BSC-IDD">B.Sc IDD</option>
    <option value="BSC-PHYSICS">B.Sc PHYSICS</option>

    <option value="BCA">BCA COMPUTER APPLICATION</option>

</select>

<select id="examType" onchange="loadExam()">

    <option value="CYCLIC-TEST-01">CYCLIC TEST 01</option>
    <option value="CYCLIC-TEST-02">CYCLIC TEST 02</option>

    <option value="INTERNAL-TEST-01">INTERNAL TEST 01</option>
    <option value="INTERNAL-TEST-02">INTERNAL TEST 02</option>

    <option value="MODEL-EXAM">MODEL EXAM</option>

    <option value="SEMESTER-EXAM">SEMESTER EXAM</option>

</select>

<div class="table-wrapper">

<table>
<thead>
<tr>
<th>Subject Code</th>
<th>Subject Name</th>
<th>Date</th>
<th>Timing</th>

</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

<button class="add" onclick="addRow()">Add Subject</button>
<button class="save" onclick="saveExam()">Save Schedule</button>

</div>

<script type="module">

import { db } from "./firebase-config.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let row = 0;

window.addRow = function(){

    row++;

    document.getElementById("tbody").innerHTML += `
    <tr>
        <td><input id="code${row}" placeholder="Subject Code"></td>
        <td><input id="name${row}" placeholder="Subject Name"></td>
        <td><input type="date" id="date${row}"></td>
        <td><input id="time${row}" placeholder="10:00 - 1:00"></td>
        
    </tr>
    `;
};

window.saveExam = async function(){

    const dept = document.getElementById("dept").value;
    const examType = document.getElementById("examType").value;

    let data = {};

    for(let i=1;i<=row;i++){

        data["Exam_"+i] = {
            SubjectCode: document.getElementById("code"+i).value,
            SubjectName: document.getElementById("name"+i).value,
            Date: document.getElementById("date"+i).value,
            Timing: document.getElementById("time"+i).value,
            Platform: document.getElementById("platform"+i).value
        };
    }

    await setDoc(doc(db,"exams",dept,examType,"schedule"), data);

    alert("Exam Schedule Saved Successfully");
};

addRow();

</script>

</body>
</html>
